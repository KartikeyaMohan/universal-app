events {
  worker_connections 1024;
}

http {
  upstream user_service {
    server user_service:3001;
  }

  upstream movie_service {
    server movie_service:3002;
  }

  upstream location_service {
    server location_service:3003;
  }

  server {
    listen 80;

    # Health check for the gateway itself
    location /health {
      return 200 'ok';
      add_header Content-Type text/plain;
    }

    # User service routes
    location /api/v1/auth/ {
      proxy_pass http://user_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/v1/users/ {
      proxy_pass http://user_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Movie service routes
    location /api/v1/movies/ {
      proxy_pass http://movie_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Location service routes
    location /api/v1/locations/ {
      proxy_pass http://location_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Fallback for unmatched routes
    location / {
      return 404 '{"error": "Route not found"}';
      add_header Content-Type application/json;
    }
  }
}