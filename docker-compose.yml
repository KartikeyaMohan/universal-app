version: "3.9"

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - user_service
      - movie_service
    networks:
      - universal-net
      
  postgres_user:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - user_db_data:/var/lib/postgresql/data
    networks:
      - universal-net

  postgres_movie:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: movie_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - movie_db_data:/var/lib/postgresql/data
    networks:
      - universal-net

  postgres_location:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: location_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - location_db_data:/var/lib/postgresql/data
    networks:
      - universal-net

  user_service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    container_name: universal-user-service
    env_file:
      - ./services/user-service/.env
    ports:
      - "3001:3001"
    depends_on:
      - postgres_user
    volumes:
      - ./services/user-service:/app
      - ./shared:/shared
    networks:
      - universal-net

  movie_service:
    build:
      context: ./services/movie-service
      dockerfile: Dockerfile
    container_name: universal-movie-service
    env_file:
      - ./services/movie-service/.env
    ports:
      - "3002:3002"
    depends_on:
      - postgres_movie
    volumes:
      - ./services/movie-service:/app
      - ./shared:/shared
    networks:
      - universal-net

  location_service:
    build:
      context: ./services/location-service
      dockerfile: Dockerfile
    container_name: universal-location-service
    env_file:
      - ./services/location-service/.env
    ports:
      - "3003:3003"
    depends_on:
      - postgres_location
    volumes:
      - ./services/location-service:/app
      - ./shared:/shared
    networks:
      - universal-net

volumes:
  user_db_data:
  movie_db_data:
  location_db_data:

networks:
  universal-net:
    driver: bridge